name: CI-CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lockfile consistency check
        run: npm run check:lock-sync

      - name: Run repository test suite
        run: npm run test:all

      - name: Run targeted operational regression tests
        run: |
          node tests/queue-health.test.js
          node tests/process-fulfillment-queue-scheduled.test.js
          node tests/process-email-queue-scheduled.test.js
          node tests/paypal-webhook.test.js
          node tests/whishpay-webhook.test.js

      - name: Run security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

  netlify-preview-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test-and-quality
    steps:
      - name: Smoke-check preview endpoints when preview URL is available
        env:
          NETLIFY_PREVIEW_URL: ${{ secrets.NETLIFY_PREVIEW_URL }}
          QUEUE_HEALTH_TOKEN: ${{ secrets.QUEUE_HEALTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_PREVIEW_URL" ]; then
            echo "NETLIFY_PREVIEW_URL not set; skipping preview smoke checks."
            exit 0
          fi

          set -e
          curl -fsS "$NETLIFY_PREVIEW_URL/"
          curl -fsS "$NETLIFY_PREVIEW_URL/privacy-policy"
          if [ -n "$QUEUE_HEALTH_TOKEN" ]; then
            curl -fsS -H "Authorization: Bearer $QUEUE_HEALTH_TOKEN" "$NETLIFY_PREVIEW_URL/.netlify/functions/queue-health"
          else
            echo "QUEUE_HEALTH_TOKEN not set; skipping authenticated queue-health check."
          fi

  production-post-deploy-checks:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test-and-quality
    steps:
      - name: Production smoke checks when URL is configured
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          QUEUE_HEALTH_TOKEN: ${{ secrets.QUEUE_HEALTH_TOKEN }}
        run: |
          if [ -z "$PRODUCTION_BASE_URL" ]; then
            echo "PRODUCTION_BASE_URL not set; skipping post-deploy smoke checks."
            exit 0
          fi

          set -e
          curl -fsS "$PRODUCTION_BASE_URL/"
          curl -fsS "$PRODUCTION_BASE_URL/terms-and-conditions"
          if [ -n "$QUEUE_HEALTH_TOKEN" ]; then
            curl -fsS -H "Authorization: Bearer $QUEUE_HEALTH_TOKEN" "$PRODUCTION_BASE_URL/.netlify/functions/queue-health"
          else
            echo "QUEUE_HEALTH_TOKEN not set; skipping authenticated queue-health check."
          fi
